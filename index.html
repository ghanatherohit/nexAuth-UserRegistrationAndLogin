<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexAuth — Welcome</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <div class="aurora-bg">
    <div class="aurora-orb"></div>
  </div>

  <nav class="top-nav">
    <span class="brand-logo"><i class="fa-solid fa-bolt"></i> NexAuth</span>
    <div class="d-flex gap-2">
      <a href="login.html" class="btn-ghost">Sign In</a>
      <a href="register.html" class="btn-aurora btn-nav">Get Started</a>
    </div>
  </nav>

  <div class="hero-section">
    <div class="hero-badge"><i class="fa-solid fa-shield-halved"></i> Secure · Fast · Modern</div>

      <a href="register.html" class="btn-hero-primary">Create Account <i class="fa-solid fa-arrow-right ms-2"></i></a>
      <a href="login.html" class="btn-hero-secondary">Sign In</a>

    <div class="features-row">
      <div class="feature-chip"><i class="fa-solid fa-database"></i> MySQL + MongoDB</div>
      <div class="feature-chip"><i class="fa-solid fa-server"></i> Redis Sessions</div>

    </div>
  </div>
