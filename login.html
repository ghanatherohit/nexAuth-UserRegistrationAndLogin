<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NexAuth — Sign In</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <div class="aurora-bg"><div class="aurora-orb"></div></div>

  <div class="page-wrapper">
    <div class="glass-card login-card">

      <div class="text-center mb-4 fade-up">
        <a href="index.html" class="brand-logo text-decoration-none d-inline-block mb-3">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
          NexAuth
        </a>
        <h1 class="page-title">Welcome <span class="gradient-text">back</span></h1>
        <p class="page-subtitle mt-1">Sign in to access your profile.</p>
      </div>

      <div id="alertBox" class="alert-box"></div>

      <form id="loginForm" autocomplete="off">

        <div class="form-group fade-up">
          <label class="form-label">Email or Username</label>
          <div class="input-icon-wrap">
            <span class="input-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </span>
            <input type="text" id="identifier" class="form-control" placeholder="john@example.com" required />
          </div>
        </div>

        <div class="form-group fade-up">
          <label class="form-label">Password</label>
          <div class="input-icon-wrap">
            <span class="input-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            </span>
            <input type="password" id="password" class="form-control" placeholder="Your password" required />
            <button type="button" class="password-toggle" id="togglePwd">
              <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
        </div>

        <div class="d-flex justify-content-end mb-3 fade-up">
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <div class="fade-up">
          <button type="submit" class="btn-aurora" id="submitBtn">
            <span id="btnText">Sign In</span>
          </button>
        </div>

      </form>

      <div class="divider-text fade-up">or</div>

      <p class="auth-link fade-up">
        Don't have an account? <a href="register.html">Create one free</a>
      </p>

    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
