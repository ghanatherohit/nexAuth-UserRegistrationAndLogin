<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NexAuth — Create Account</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <div class="aurora-bg"><div class="aurora-orb"></div></div>

  <div class="page-wrapper">
    <div class="glass-card register-card">

      <div class="text-center mb-4 fade-up">
        <a href="index.html" class="brand-logo text-decoration-none d-inline-block mb-3">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
          NexAuth
        </a>
        <h1 class="page-title">Create your <span class="gradient-text">account</span></h1>
        <p class="page-subtitle mt-1">Join thousands of users. It only takes a minute.</p>
      </div>

      <div id="alertBox" class="alert-box"></div>

      <form id="registerForm" autocomplete="off">

        <div class="row fade-up">
          <div class="col-6">
            <div class="form-group">
              <label class="form-label">First Name</label>
              <div class="input-icon-wrap">
                <span class="input-icon">
                  <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </span>
                <input type="text" id="firstName" class="form-control" placeholder="John" required />
              </div>
            </div>
          </div>
          <div class="col-6">
            <div class="form-group">
              <label class="form-label">Last Name</label>
              <div class="input-icon-wrap">
                <span class="input-icon">
                  <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </span>
                <input type="text" id="lastName" class="form-control" placeholder="Doe" required />
              </div>
            </div>
          </div>
        </div>

        <div class="form-group fade-up">
          <label class="form-label">Email Address</label>
          <div class="input-icon-wrap">
            <span class="input-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
            </span>
            <input type="email" id="email" class="form-control" placeholder="john@example.com" required />
          </div>
        </div>

        <div class="form-group fade-up">
          <label class="form-label">Username</label>
          <div class="input-icon-wrap">
            <span class="input-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-3.92 7.94"></path></svg>
            </span>
            <input type="text" id="username" class="form-control" placeholder="johndoe" required />
          </div>
        </div>

        <div class="form-group fade-up">
          <label class="form-label">Password</label>
          <div class="input-icon-wrap">
            <span class="input-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            </span>
            <input type="password" id="password" class="form-control" placeholder="Min. 8 characters" required />
            <button type="button" class="password-toggle" id="togglePwd">
              <svg id="eyeIconReg" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
          <div class="strength-bar-wrap mt-2">
            <div class="strength-segment" id="s1"></div>
            <div class="strength-segment" id="s2"></div>
            <div class="strength-segment" id="s3"></div>
            <div class="strength-segment" id="s4"></div>
          </div>
          <div class="strength-label" id="strengthLabel">Enter a password</div>
        </div>

        <div class="form-group fade-up">
          <label class="form-label">Confirm Password</label>
          <div class="input-icon-wrap">
            <span class="input-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            </span>
            <input type="password" id="confirmPassword" class="form-control" placeholder="Repeat password" required />
          </div>
        </div>

        <div class="fade-up mt-3">
          <button type="submit" class="btn-aurora" id="submitBtn">
            <span id="btnText">Create Account</span>
          </button>
        </div>

      </form>

      <div class="divider-text fade-up">or</div>

      <p class="auth-link fade-up">
        Already have an account? <a href="login.html">Sign in here</a>
      </p>

    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
