<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NexAuth — My Profile</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <div class="aurora-bg"><div class="aurora-orb"></div></div>

  <!-- Navbar -->
  <nav class="top-nav">
    <span class="brand-logo"><i class="fa-solid fa-bolt"></i> NexAuth</span>
    <div class="d-flex align-items-center gap-3">
      <span id="navUsername" class="stat-pill"><i class="fa-solid fa-circle online-dot"></i> Online</span>
      <button class="btn-danger nav-logout-btn" id="logoutBtn">
        <i class="fa-solid fa-right-from-bracket me-1"></i> Logout
      </button>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="profile-layout profile-layout-content">
    <div class="container profile-container">

      <!-- Global alert -->
      <div id="globalAlert" class="alert-box mb-3"></div>

      <!-- Profile Header Card -->
      <div class="glass-card p-4 mb-3 fade-up">
        <div class="d-flex align-items-center gap-3 flex-wrap">
          <div class="avatar-circle" id="avatarCircle">?</div>
          <div class="flex-grow-1">
            <h2 class="page-title profile-name-title" id="profileName">Loading…</h2>
            <div class="d-flex gap-2 mt-1 flex-wrap" id="profileMeta">
              <span class="stat-pill"><i class="fa-solid fa-at"></i> <span id="profileUsername">—</span></span>
              <span class="stat-pill"><i class="fa-solid fa-envelope"></i> <span id="profileEmail">—</span></span>
            </div>
          </div>
          <div class="d-flex gap-2">
            <button class="btn-ghost" id="editBtn">
              <i class="fa-solid fa-pen-to-square me-1"></i> Edit Profile
            </button>
            <button class="btn-aurora profile-save-btn" id="saveBtn">
              <span id="saveBtnText">Save Changes</span>
            </button>
            <button class="btn-ghost profile-cancel-btn" id="cancelBtn">Cancel</button>
          </div>
        </div>
      </div>

      <div class="row g-3">

        <!-- Personal Info -->
        <div class="col-md-6 fade-up">
          <div class="glass-card p-4 h-100">
            <p class="section-heading"><i class="fa-solid fa-id-card me-2"></i>Personal Info</p>
            <div id="alertBox" class="alert-box mb-2"></div>

            <!-- View Mode -->
            <div id="viewMode">
              <div class="info-row">
                <div class="info-icon blue"><i class="fa-solid fa-cake-candles"></i></div>
                <div>
                  <div class="info-label">Date of Birth</div>
                  <div class="info-value" id="view-dob">—</div>
                </div>
              </div>
              <div class="info-row">
                <div class="info-icon violet"><i class="fa-solid fa-person"></i></div>
                <div>
                  <div class="info-label">Age</div>
                  <div class="info-value" id="view-age">—</div>
                </div>
              </div>
              <div class="info-row">
                <div class="info-icon emerald"><i class="fa-solid fa-venus-mars"></i></div>
                <div>
                  <div class="info-label">Gender</div>
                  <div class="info-value" id="view-gender">—</div>
                </div>
              </div>
              <div class="info-row">
                <div class="info-icon amber"><i class="fa-solid fa-phone"></i></div>
                <div>
                  <div class="info-label">Contact</div>
                  <div class="info-value" id="view-contact">—</div>
                </div>
              </div>
            </div>

            <!-- Edit Mode -->
            <div id="editMode" class="profile-edit-mode">
              <div class="form-group">
                <label class="form-label">Date of Birth</label>
                <input type="date" id="edit-dob" class="form-control" />
              </div>
              <div class="form-group">
                <label class="form-label">Gender</label>
                <select id="edit-gender" class="form-select">
                  <option value="">Select gender</option>
                  <option value="Male">Male</option>
                  <option value="Female">Female</option>
                  <option value="Non-binary">Non-binary</option>
                  <option value="Prefer not to say">Prefer not to say</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Contact Number</label>
                <div class="input-icon-wrap">
                  <i class="input-icon fa-solid fa-phone"></i>
                  <input type="tel" id="edit-contact" class="form-control" placeholder="+91 98765 43210" />
                </div>
              </div>
            </div>

          </div>
        </div>

        <!-- Additional Details -->
        <div class="col-md-6 fade-up">
          <div class="glass-card p-4 h-100">
            <p class="section-heading"><i class="fa-solid fa-circle-info me-2"></i>Additional Details</p>

            <!-- View Mode -->
            <div id="viewMode2">
              <div class="info-row">
                <div class="info-icon rose"><i class="fa-solid fa-map-pin"></i></div>
                <div>
                  <div class="info-label">City</div>
                  <div class="info-value" id="view-city">—</div>
                </div>
              </div>
              <div class="info-row">
                <div class="info-icon blue"><i class="fa-solid fa-earth-asia"></i></div>
                <div>
                  <div class="info-label">Country</div>
                  <div class="info-value" id="view-country">—</div>
                </div>
              </div>
              <div class="info-row">
                <div class="info-icon violet"><i class="fa-solid fa-briefcase"></i></div>
                <div>
                  <div class="info-label">Occupation</div>
                  <div class="info-value" id="view-occupation">—</div>
                </div>
              </div>
              <div class="info-row">
                <div class="info-icon emerald"><i class="fa-solid fa-note-sticky"></i></div>
                <div>
                  <div class="info-label">Bio</div>
                  <div class="info-value profile-bio-value" id="view-bio">—</div>
                </div>
              </div>
            </div>

            <!-- Edit Mode -->
            <div id="editMode2" class="profile-edit-mode">
              <div class="row">
                <div class="col-6">
                  <div class="form-group">
                    <label class="form-label">City</label>
                    <div class="input-icon-wrap">
                      <i class="input-icon fa-solid fa-map-pin"></i>
                      <input type="text" id="edit-city" class="form-control" placeholder="Hyderabad" />
                    </div>
                  </div>
                </div>
                <div class="col-6">
                  <div class="form-group">
                    <label class="form-label">Country</label>
                    <div class="input-icon-wrap">
                      <i class="input-icon fa-solid fa-earth-asia"></i>
                      <input type="text" id="edit-country" class="form-control" placeholder="India" />
                    </div>
                  </div>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Occupation</label>
                <div class="input-icon-wrap">
                  <i class="input-icon fa-solid fa-briefcase"></i>
                  <input type="text" id="edit-occupation" class="form-control" placeholder="Software Engineer" />
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Bio</label>
                <textarea id="edit-bio" class="form-control profile-bio-textarea" rows="3" placeholder="Tell us about yourself…"></textarea>
              </div>
            </div>

          </div>
        </div>

        <!-- Account Info -->
        <div class="col-12 fade-up">
          <div class="glass-card p-4">
            <p class="section-heading"><i class="fa-solid fa-shield-halved me-2"></i>Account Info</p>
            <div class="row">
              <div class="col-md-4">
                <div class="info-row">
                  <div class="info-icon blue"><i class="fa-solid fa-calendar-plus"></i></div>
                  <div>
                    <div class="info-label">Member Since</div>
                    <div class="info-value" id="view-joined">—</div>
                  </div>
                </div>
              </div>
              <div class="col-md-4">
                <div class="info-row">
                  <div class="info-icon emerald"><i class="fa-solid fa-circle-check"></i></div>
                  <div>
                    <div class="info-label">Account Status</div>
                    <div class="info-value account-status-active">Active</div>
                  </div>
                </div>
              </div>
              <div class="col-md-4">
                <div class="info-row">
                  <div class="info-icon amber"><i class="fa-solid fa-user-shield"></i></div>
                  <div>
                    <div class="info-label">Role</div>
                    <div class="info-value" id="view-role">User</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
